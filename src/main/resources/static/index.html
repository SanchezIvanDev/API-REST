<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Tareas con Spring Boot</title>
    <style>
        body { font-family: sans-serif;
        max-width: 600px;
        margin: 40px auto;
        background: #f4f4f4;
        }
        .tarea-card {
        background: white;
        padding: 15px;
        margin-bottom: 10px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .fecha {
        font-size: 0.8em;
        color: #888;
        }
        .formulario {
        margin-bottom: 30px;
        display: flex;
        gap: 10px;
        }
        input {
        flex-grow: 1;
        padding: 10px;
        }
        button {
        padding: 10px 20px;
        cursor: pointer;
        background: #28a745;
        color: white;
        border: none;
        border-radius: 4px;
        }
    </style>
</head>
<body>

<h1>📝 Mis Tareas</h1>

<div class="formulario">
    <input type="text" id="inputTarea" placeholder="Nueva tarea...">
    <button onclick="agregarTarea()">Añadir</button>
</div>

<div id="listaTareas">
</div>

<script>
    function cargarTareas() {
        fetch('/api/tareas')
            .then(response => response.json())
            .then(tareas => {
                const contenedor = document.getElementById('listaTareas');
                contenedor.innerHTML = '';
                tareas.forEach(tarea => {
                    const div = document.createElement('div');
                    div.className = 'tarea-card';
                    div.innerHTML = `
                        <strong>${tarea.descripcion}</strong>
                        <div class="fecha">Creada el: ${new Date(tarea.fechaCreacion).toLocaleString()}</div>
                    `;
                    contenedor.appendChild(div);
                });
            });
    }

    function agregarTarea() {
        const desc = document.getElementById('inputTarea').value;

        fetch('/api/tareas', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ descripcion: desc, completada: false })
        })
        .then(response => {
            if(response.ok) {
                document.getElementById('inputTarea').value = '';
                cargarTareas();
            } else {
                alert("Error: ¿Quizás dejaste el campo vacío?");
            }
        });
    }
    cargarTareas();
</script>
</body>
</html>
