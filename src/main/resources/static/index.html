<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Tareas con Spring Boot</title>
    <style>
        body { font-family: sans-serif;
        max-width: 600px;
        margin: 40px auto;
        background: #f4f4f4;
        }
        .tarea-card {
        background: white;
        padding: 15px;
        margin-bottom: 10px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .fecha {
        font-size: 0.8em;
        color: #888;
        }
        .formulario {
        margin-bottom: 30px;
        display: flex;
        gap: 10px;
        }
        input {
        flex-grow: 1;
        padding: 10px;
        }
        button {
        padding: 10px 20px;
        cursor: pointer;
        background: #28a745;
        color: white;
        border: none;
        border-radius: 4px;
        }
    </style>
</head>
<body>

<h1>📝 Mis Tareas</h1>

<div class="formulario">
    <input type="text" id="inputTarea" placeholder="Nueva tarea...">
    <button onclick="agregarTarea()">Añadir</button>
</div>

<div id="listaTareas">
</div>

<script>
    const contenedorTareas = document.getElementById('listaTareas');
    const inputNuevaTarea = document.getElementById('inputTarea');

    const api = {
        async fetchAll() {
            const res = await fetch('/api/tareas');
            return res.json();
        },
        async delete(id) {
            return fetch(`/api/tareas/${id}`, { method: 'DELETE' });
        },
        async create(descripcion) {
            return fetch('/api/tareas', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ descripcion, completada: false })
            });
        }
    };

    function crearPlantillaTarea(tarea) {
        const fecha = new Date(tarea.fechaCreacion).toLocaleString();

        const div = document.createElement('div');
        div.className = 'tarea-card';
        div.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <strong>${tarea.descripcion}</strong>
                    <div class="fecha">Creada el: ${fecha}</div>
                </div>
                <button class="btn-eliminar" data-id="${tarea.id}">Eliminar</button>
            </div>
        `;

        div.querySelector('.btn-eliminar').onclick = () => borrarTarea(tarea.id);

        return div;
    }

    async function cargarTareas() {
        try {
            const tareas = await api.fetchAll();
            contenedorTareas.innerHTML = '';
            tareas.forEach(tarea => {
                contenedorTareas.appendChild(crearPlantillaTarea(tarea));
            });
        } catch (error) {
            console.error("Error al cargar tareas:", error);
        }
    }

    async function agregarTarea() {
        const descripcion = inputNuevaTarea.value.trim();

        if (!descripcion) {
            alert("Por favor, escribe una descripción");
            return;
        }

        const response = await api.create(descripcion);

        if (response.ok) {
            inputNuevaTarea.value = '';
            cargarTareas();
        } else {
            alert("Error al guardar la tarea");
        }
    }

    async function borrarTarea(id) {
        if (!confirm("¿Seguro que quieres eliminar esta tarea?")) return;

        const response = await api.delete(id);
        if (response.ok) {
            cargarTareas();
        } else {
            alert("No se pudo eliminar la tarea");
        }
    }

    document.addEventListener('DOMContentLoaded', cargarTareas);
</script>
</body>
</html>
